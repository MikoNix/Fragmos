<!DOCTYPE html>
<html>
<head>
<meta name="color-scheme" content="light dark">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:transparent;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif}
.scene{position:relative;width:100%;height:420px}

/* ── Текст статуса сверху по центру ── */
.status{position:absolute;top:12px;left:0;right:0;text-align:center;z-index:20}
.status-text{font-size:14px;font-weight:700;color:#e6edf3;transition:opacity 0.4s}
.status-sub{font-size:11px;color:#8b949e;margin-top:2px}

/* ── Фоновые орбиты (остаются как декор) ── */
.bg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:320px;height:320px;z-index:0}
.orbit{position:absolute;top:50%;left:50%;border-radius:50%;border-style:solid;border-width:1.5px;animation:spin linear infinite}
.o1{width:160px;height:160px;margin:-80px 0 0 -80px;border-color:rgba(163,113,247,0.12);animation-duration:20s}
.o2{width:220px;height:220px;margin:-110px 0 0 -110px;border-color:rgba(88,166,255,0.09);animation-duration:28s;animation-direction:reverse}
.o3{width:280px;height:280px;margin:-140px 0 0 -140px;border-color:rgba(255,123,114,0.06);animation-duration:36s}
.orb{position:absolute;width:8px;height:8px;border-radius:50%;top:-4px;left:50%;margin-left:-4px}
.o1 .orb{background:#a371f7;box-shadow:0 0 12px #a371f7}
.o2 .orb{background:#58a6ff;box-shadow:0 0 12px #58a6ff}
.o3 .orb{background:#ff7b72;box-shadow:0 0 12px #ff7b72}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Центральная зона для блок-схемы ── */
.flowchart{position:absolute;top:50px;left:50%;transform:translateX(-50%);z-index:10;display:flex;flex-direction:column;align-items:center;gap:0}

/* Блок */
.block{
  opacity:0;padding:8px 20px;border-radius:8px;font-size:12px;font-weight:600;
  color:#e6edf3;white-space:nowrap;text-align:center;position:relative;
  animation:block-drop 0.6s ease forwards;
}
.block.start{background:rgba(163,113,247,0.25);border:1.5px solid rgba(163,113,247,0.5);border-radius:20px}
.block.process{background:rgba(88,166,255,0.2);border:1.5px solid rgba(88,166,255,0.4)}
.block.decision{
  background:rgba(248,81,73,0.2);border:1.5px solid rgba(248,81,73,0.4);
  transform-origin:center;clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);
  padding:18px 28px;
}
.block.end{background:rgba(63,185,80,0.2);border:1.5px solid rgba(63,185,80,0.4);border-radius:20px}

/* Стрелка между блоками */
.arrow{
  width:2px;height:0;background:linear-gradient(180deg,rgba(163,113,247,0.6),rgba(88,166,255,0.6));
  position:relative;opacity:0;
  animation:arrow-grow 0.4s ease forwards;
}
.arrow::after{
  content:'';position:absolute;bottom:-5px;left:-4px;
  border-left:5px solid transparent;border-right:5px solid transparent;
  border-top:6px solid rgba(88,166,255,0.7);
}

/* Анимация "упаковки" — текст кладётся в коробку */
.pack-phase{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:15;display:flex;flex-direction:column;align-items:center;gap:12px}
.pack-box{
  width:80px;height:60px;border:2px solid rgba(163,113,247,0.5);border-radius:8px;
  background:rgba(163,113,247,0.08);position:relative;overflow:hidden;
}
.pack-box::after{
  content:'';position:absolute;top:0;left:0;right:0;height:14px;
  background:rgba(163,113,247,0.2);border-bottom:1px solid rgba(163,113,247,0.3);
}
.pack-item{
  position:absolute;font-size:9px;color:#a371f7;font-weight:600;white-space:nowrap;
  animation:pack-fall 1.8s ease-in infinite;
}
.pi1{left:12px;animation-delay:0s}
.pi2{left:28px;animation-delay:0.5s}
.pi3{left:45px;animation-delay:1.0s}

@keyframes block-drop{
  0%{opacity:0;transform:translateY(-20px)}
  100%{opacity:1;transform:translateY(0)}
}
@keyframes arrow-grow{
  0%{opacity:0;height:0}
  100%{opacity:1;height:24px}
}
@keyframes pack-fall{
  0%{top:-14px;opacity:0}
  20%{opacity:1}
  80%{opacity:1}
  100%{top:40px;opacity:0}
}
</style>
</head>
<body>
<div class="scene">
  <!-- Статус текст сверху -->
  <div class="status">
    <div class="status-text" id="statusText">Упаковываем данные...</div>
    <div class="status-sub">Fragmos AI</div>
  </div>

  <!-- Фоновые орбиты -->
  <div class="bg">
    <div class="orbit o1"><div class="orb"></div></div>
    <div class="orbit o2"><div class="orb"></div></div>
    <div class="orbit o3"><div class="orb"></div></div>
  </div>

  <!-- Контейнер анимаций (переключается JS) -->
  <div id="animArea"></div>
</div>

<script>
const area = document.getElementById('animArea');
const statusEl = document.getElementById('statusText');

const phases = [
  {
    text: 'Упаковываем данные...',
    duration: 3000,
    build() {
      const d = document.createElement('div');
      d.className = 'pack-phase';
      d.innerHTML = `
        <div class="pack-box">
          <div class="pack-item pi1">int x</div>
          <div class="pack-item pi2">if()</div>
          <div class="pack-item pi3">for</div>
        </div>
      `;
      return d;
    }
  },
  {
    text: 'Отправляем агенту...',
    duration: 2500,
    build() {
      const d = document.createElement('div');
      d.className = 'pack-phase';
      d.innerHTML = `
        <div style="position:relative;width:80px;height:60px">
          <div style="position:absolute;width:40px;height:30px;border:1.5px solid rgba(88,166,255,0.4);border-radius:6px;background:rgba(88,166,255,0.1);top:15px;left:0;animation:sendPulse 1s ease-in-out infinite alternate">
            <div style="font-size:8px;color:#58a6ff;text-align:center;line-height:30px;font-weight:700">{...}</div>
          </div>
          <div style="position:absolute;right:0;top:10px;width:30px;height:40px;border:1.5px solid rgba(163,113,247,0.4);border-radius:50%;background:rgba(163,113,247,0.1);display:flex;align-items:center;justify-content:center">
            <div style="font-size:10px;color:#a371f7;font-weight:700">AI</div>
          </div>
          <svg style="position:absolute;top:28px;left:42px" width="16" height="6"><path d="M0 3h12l-4-3M12 3l-4 3" stroke="#58a6ff" stroke-width="1.5" fill="none" opacity="0.6"><animate attributeName="opacity" values="0.3;1;0.3" dur="1s" repeatCount="indefinite"/></path></svg>
        </div>
      `;
      const style = document.createElement('style');
      style.textContent = '@keyframes sendPulse{0%{transform:translateX(0)}100%{transform:translateX(6px)}}';
      d.appendChild(style);
      return d;
    }
  },
  {
    text: 'Анализируем код...',
    duration: 2500,
    build() { return buildFlowchart(['START','Чтение кода'], 0); }
  },
  {
    text: 'Строим граф...',
    duration: 3000,
    build() { return buildFlowchart(['START','Чтение кода','if (x > 0)?','Обработка'], 0); }
  },
  {
    text: 'Генерируем блок-схему...',
    duration: 3500,
    build() { return buildFlowchart(['START','Чтение кода','if (x > 0)?','Обработка','Запись','STOP'], 0); }
  }
];

function buildFlowchart(items, baseDelay) {
  const d = document.createElement('div');
  d.className = 'flowchart';
  items.forEach((txt, i) => {
    if (i > 0) {
      const arrow = document.createElement('div');
      arrow.className = 'arrow';
      arrow.style.animationDelay = (baseDelay + i * 0.5 - 0.25) + 's';
      d.appendChild(arrow);
    }
    const b = document.createElement('div');
    let cls = 'block ';
    if (txt === 'START') cls += 'start';
    else if (txt === 'STOP') cls += 'end';
    else if (txt.startsWith('if')) cls += 'decision';
    else cls += 'process';
    b.className = cls;
    b.textContent = txt;
    b.style.animationDelay = (baseDelay + i * 0.5) + 's';
    d.appendChild(b);
  });
  return d;
}

let current = 0;
function showPhase() {
  const phase = phases[current];
  statusEl.style.opacity = 0;
  setTimeout(() => {
    statusEl.textContent = phase.text;
    statusEl.style.opacity = 1;
  }, 300);
  area.innerHTML = '';
  area.appendChild(phase.build());
  current = (current + 1) % phases.length;
  setTimeout(showPhase, phase.duration);
}
showPhase();
</script>
</body>
</html>
